# 通用 Agent 团队能力注册表
# 格式: agent_id → {name, department, capabilities, description, file}
# capabilities: 能力标签列表,供 router 匹配使用

agents:

  # ============ 核心调度层 ============
  - id: core-orchestrator
    name: 通用主控
    department: core
    file: core/orchestrator.md
    description: 通用多智能体编排器,接收任务、调度 subagent、汇总结果
    capabilities: [orchestration, coordination, planning]
    priority: 1

  - id: core-router
    name: 任务路由器
    department: core
    file: core/router.md
    description: 意图识别 + 能力匹配,把任务映射到具体 agent
    capabilities: [intent-recognition, classification, routing]
    priority: 2

  - id: core-aggregator
    name: 结果汇总器
    department: core
    file: core/aggregator.md
    description: 多 subagent 输出合并为最终交付物
    capabilities: [synthesis, formatting, deduplication]
    priority: 2

  - id: core-task-planner
    name: 任务拆解器
    department: core
    file: core/task-planner.md
    description: 把复杂任务拆成 MECE 子任务
    capabilities: [decomposition, dependency-analysis, planning]
    priority: 2

  # ============ 技术部 ============
  - id: tech-architect
    name: 技术架构师
    department: tech
    file: tech/architect.md
    description: 技术选型、系统架构、模块拆分
    capabilities: [architecture, tech-stack, system-design, scalability]
    priority: 1

  - id: tech-backend-dev
    name: 后端开发
    department: tech
    file: tech/backend-dev.md
    description: 后端 API、数据库、服务端逻辑
    capabilities: [backend, api, database, server, python, node, go]
    priority: 1

  - id: tech-frontend-dev
    name: 前端开发
    department: tech
    file: tech/frontend-dev.md
    description: Web 前端、UI 实现、交互逻辑
    capabilities: [frontend, ui, react, vue, css, html, javascript]
    priority: 1

  - id: tech-mobile-dev
    name: 移动端开发
    department: tech
    file: tech/mobile-dev.md
    description: iOS / Android / 跨端开发
    capabilities: [mobile, ios, android, react-native, flutter]
    priority: 2

  - id: tech-devops
    name: DevOps 工程师
    department: tech
    file: tech/devops.md
    description: CI/CD、部署、监控、运维
    capabilities: [devops, ci-cd, deployment, monitoring, docker, k8s]
    priority: 2

  - id: tech-qa
    name: 测试工程师
    department: tech
    file: tech/qa.md
    description: 功能测试、性能测试、自动化测试
    capabilities: [testing, qa, automation, performance-testing]
    priority: 2

  # ============ 调研分析部 ============
  - id: research-analyst
    name: 通用调研分析师
    department: research
    file: research/analyst.md
    description: 通用信息收集、分析、报告撰写
    capabilities: [research, analysis, report, data-analysis]
    priority: 1

  - id: research-market
    name: 市场研究员
    department: research
    file: research/market.md
    description: 市场调研、用户洞察、TAM/SAM/SOM 测算
    capabilities: [market-research, user-insight, market-sizing, tam-sam-som]
    priority: 1

  - id: research-competitor
    name: 竞品分析师
    department: research
    file: research/competitor.md
    description: 竞品分析、对比矩阵、差异化分析
    capabilities: [competitor-analysis, benchmarking, swot]
    priority: 2

  # ============ 战略部 ============
