schema_version: "2.0"
updated: "2026-07-19"

defaults:
  min_confidence: 0.65
  max_candidates: 3
  capability_weight: 0.70
  domain_weight: 0.20
  product_weight: 0.10
  unsupported_signals: [historical_success_rate, current_load]

rules:
  - id: startup-direction-discovery
    priority: preflight
    keywords: [创业, BP, 商业计划书, 做什么, 方向, 赛道, 品类, 从0到1]
    trigger_when: [material_business_direction_missing, user_requests_direction_options]
    required_capabilities: [discovery-facilitation, ambiguity-detection]
    preferred_agents: [core-orchestrator]
    blocks_until: direction-brief.dag_entry_authorized

  - id: software-architecture
    keywords: [架构, 技术选型, 系统设计, scalability, 微服务]
    required_capabilities: [architecture]
    preferred_agents: [tech-architect]

  - id: code-review
    keywords: [代码审查, code review, 规格符合性, 安全审查, 性能审查, 可维护性, 测试质量]
    required_capabilities: [code-review]
    preferred_agents: [tech-code-reviewer]

  - id: backend-development
    keywords: [后端, API, 接口, 数据库, 服务端, python, node, go, java]
    required_capabilities: [backend]
    preferred_agents: [tech-backend-dev]

  - id: frontend-development
    keywords: [前端, 页面, UI, 组件, react, vue, typescript]
    required_capabilities: [frontend]
    preferred_agents: [tech-frontend-dev]

  - id: mobile-development
    keywords: [移动端, iOS, Android, Flutter, React Native, 小程序]
    required_capabilities: [mobile]
    preferred_agents: [tech-mobile-dev]

  - id: deployment
    keywords: [部署, 上线, CI/CD, docker, k8s, 运维, 监控]
    required_capabilities: [devops]
    preferred_agents: [tech-devops]

  - id: quality-assurance
    keywords: [测试, QA, 自动化测试, 性能测试, E2E]
    required_capabilities: [testing]
    preferred_agents: [tech-qa]

  - id: general-research
    keywords: [调研, 研究, 资料, 事实核查, 综合分析]
    required_capabilities: [research]
    preferred_agents: [research-analyst]

  - id: market-research
    keywords: [市场, 行业规模, TAM, SAM, SOM, 用户画像, 市场细分]
    required_capabilities: [market-research]
    preferred_agents: [research-market]

  - id: user-validation
    keywords: [用户访谈, 需求验证, 用户研究, 访谈提纲]
    required_capabilities: [user-research]
    preferred_agents: [strategy-market-researcher]

  - id: competitor-analysis
    keywords: [竞品, 对标, 竞争对手, 差异化, SWOT]
    required_capabilities: [competitor-analysis]
    preferred_agents: [research-competitor]

  - id: startup-validation
    keywords: [创业验证, 立项, 假设验证, GO, NO-GO, 从0到1]
    required_capabilities: [validation, hypothesis-testing]
    preferred_agents: [strategy-opc]

  - id: business-strategy
    keywords: [战略, 商业模式, 五力, PEST, 行业分析]
    required_capabilities: [strategy]
    preferred_agents: [strategy-analyst]

  - id: product-management
    keywords: [PRD, 产品需求, 用户故事, 路线图, 产品规划]
    required_capabilities: [product-management]
    preferred_agents: [product-pm]

  - id: mvp-design
    keywords: [MVP, 最小可行产品, 原型, 范围裁剪, 验证指标]
    required_capabilities: [mvp]
    preferred_agents: [product-mvp-designer]

  - id: growth-marketing
    keywords: [增长, 获客, 漏斗, 留存, AARRR, 增长实验]
    required_capabilities: [growth]
    preferred_agents: [marketing-growth-hacker]

  - id: content-marketing
    keywords: [内容策略, 文案, 文章, 内容创作, 品牌文案]
    required_capabilities: [content]
    preferred_agents: [marketing-content-creator]

  - id: campaign
    keywords: [营销活动, campaign, 曝光活动, 发布活动]
    required_capabilities: [campaign]
    preferred_agents: [marketing-campaign-planner]

  - id: financial-model
    keywords: [财务模型, 预算, 现金流, 盈亏平衡, LTV, CAC, 单位经济]
    required_capabilities: [financial-model]
    preferred_agents: [finance-financial-analyst]

  - id: fundraising
    keywords: [融资, 估值, 投资人, 路演, 资金用途]
    required_capabilities: [fundraising]
    preferred_agents: [finance-fundraising]

  - id: organization
    keywords: [组织架构, 股权设计, 公司治理, 岗位结构]
    required_capabilities: [org-design]
    preferred_agents: [org-architect]

  - id: hiring
    keywords: [招聘, 人才规划, JD, 薪酬, 团队文化]
    required_capabilities: [hiring]
    preferred_agents: [org-talent-planner]

  - id: risk
    keywords: [风险, 合规, 法律, 监管, 风险矩阵]
    required_capabilities: [risk]
    preferred_agents: [risk-manager]

  - id: business-plan
    keywords: [BP, 商业计划书, 投资人版本]
    required_capabilities: [bp-writing]
    preferred_agents: [director-bp]
    preconditions: [direction-brief.dag_entry_authorized, project-brief]
