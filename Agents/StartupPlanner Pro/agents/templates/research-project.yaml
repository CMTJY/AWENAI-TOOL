schema_version: "2.0"
workflow:
  id: research-project
  name: 多源调研协作流
  version: "2.0"
  goal: 形成来源可追溯、经过交叉验证的综合调研报告
  system_inputs: [project-brief]
  final_artifacts: [research-deliverable]
  tasks:
    - id: research-scope
      objective: 定义调研边界、关键问题、证据标准和时效要求
      agent: research-analyst
      depends_on: []
      requires: [project-brief]
      produces: {id: research-scope, type: research-plan}
      acceptance_criteria: [问题可回答, 范围与非范围明确, 定义来源和时效标准]
      reviewer: core-quality-reviewer
      retry: {max_attempts: 2}
      failure_policy: block_dependents
    - id: market-dimension
      objective: 收集市场规模、趋势和用户细分证据
      agent: research-market
      depends_on: [research-scope]
      requires: [research-scope]
      produces: {id: market-dimension, type: market-report}
      acceptance_criteria: [核心数据有至少两个来源, 标注口径差异, 标注日期]
      reviewer: core-quality-reviewer
      retry: {max_attempts: 2}
      failure_policy: block_dependents
    - id: competitor-dimension
      objective: 收集竞争格局、替代方案和差异证据
      agent: research-competitor
      depends_on: [research-scope]
      requires: [research-scope]
      produces: {id: competitor-dimension, type: competitor-report}
      acceptance_criteria: [覆盖直接与间接替代, 对比口径一致, 关键事实有来源]
      reviewer: core-quality-reviewer
      retry: {max_attempts: 2}
      failure_policy: block_dependents
    - id: general-evidence
      objective: 补充政策、技术、商业和反方证据
      agent: research-analyst
      depends_on: [research-scope]
      requires: [research-scope]
      produces: {id: general-evidence, type: evidence-pack}
      acceptance_criteria: [同时包含支持与反对证据, 来源质量分级, 区分事实和推断]
      reviewer: core-quality-reviewer
      retry: {max_attempts: 2}
      failure_policy: block_dependents
    - id: evidence-reconciliation
      objective: 处理来源冲突、口径差异和证据缺口
      agent: strategy-analyst
      depends_on: [market-dimension, competitor-dimension, general-evidence]
      requires: [market-dimension, competitor-dimension, general-evidence]
      produces: {id: evidence-ledger, type: evidence-ledger}
      acceptance_criteria: [逐项记录冲突, 给出采用口径及理由, 未解决缺口显式保留]
      reviewer: core-quality-reviewer
      retry: {max_attempts: 2}
      failure_policy: block_dependents
    - id: research-integration
      objective: 将已核验的证据和冲突账本整合为调研报告
      agent: core-aggregator
      depends_on: [evidence-reconciliation]
      requires: [research-scope, market-dimension, competitor-dimension, general-evidence, evidence-ledger]
      produces: {id: research-deliverable, type: integrated-deliverable}
      acceptance_criteria: [回答全部关键问题, 核心结论可追溯, 局限与下一步验证明确]
      reviewer: core-quality-reviewer
      retry: {max_attempts: 2}
      failure_policy: fail_workflow
