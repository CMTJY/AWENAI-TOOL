schema_version: "2.0"
workflow:
  id: software-dev
  name: 软件交付协作流
  version: "3.0"
  goal: 从冻结需求到通过独立代码审查、测试验收并具备发布条件的软件交付物
  system_inputs: [project-brief]
  final_artifacts: [release-readiness-package]
  controls:
    task_packet_required: true
    file_scope_required_for_code: true
    verification_evidence_required: true
    implementation_review_gates: [specification-compliance, code-quality]
    qa_is_not_code_reviewer: true
  tasks:
    - id: requirements
      objective: 冻结范围、用户故事、非目标和可验证验收标准
      agent: product-pm
      depends_on: []
      requires: [project-brief]
      produces: {id: product-requirements, type: prd}
      acceptance_criteria: [核心用户故事完整, 每个故事有可验证验收标准, 明确非目标与约束]
      reviewer: core-quality-reviewer
      retry: {max_attempts: 2}
      failure_policy: block_dependents

    - id: architecture
      objective: 设计架构、稳定契约、实现 DAG、文件边界和风险验证方案
      agent: tech-architect
      depends_on: [requirements]
      requires: [product-requirements]
      required_skills: [brainstorming, writing-plans, verification-before-completion]
      produces: {id: technical-design, type: technical-architecture}
      acceptance_criteria: [架构覆盖功能与非功能需求, API和数据模型明确, 实现任务与文件边界无冲突, 关键风险有验证方案]
      reviewer: core-quality-reviewer
      retry: {max_attempts: 2}
      failure_policy: block_dependents

    - id: test-strategy
      objective: 在实现前建立分层测试策略、验收映射、环境与测试数据计划
      agent: tech-qa
      depends_on: [requirements, architecture]
      requires: [product-requirements, technical-design]
      required_skills: [test-driven-development, verification-before-completion]
      produces: {id: test-strategy, type: test-plan}
      acceptance_criteria: [验收标准映射到测试层级, 定义P0与P1用例, 环境数据与非功能验证可执行]
      reviewer: core-quality-reviewer
      retry: {max_attempts: 2}
      failure_policy: block_dependents

    - id: backend
      objective: 在授权文件范围内实现后端、数据库和 API，并提交验证证据
      agent: tech-backend-dev
      depends_on: [architecture, test-strategy]
      requires: [product-requirements, technical-design, test-strategy]
      required_skills: [test-driven-development, verification-before-completion]
      file_scope: required
      produces: {id: backend-package, type: backend-code}
      acceptance_criteria: [实现约定API, 包含关键自动化测试, 数据迁移可执行, 验证证据可复现]
      reviewer: tech-code-reviewer
      review_gates: [specification-compliance, code-quality]
      retry: {max_attempts: 2}
      failure_policy: block_dependents

    - id: frontend
      objective: 在授权文件范围内实现 Web 体验、状态、可访问性和前端测试
      agent: tech-frontend-dev
      depends_on: [architecture, test-strategy]
      requires: [product-requirements, technical-design, test-strategy]
      required_skills: [frontend-design, ui-ux-pro-max, test-driven-development, verification-before-completion]
      file_scope: required
      produces: {id: frontend-package, type: frontend-code}
      acceptance_criteria: [覆盖核心用户故事与状态, API调用符合契约, 满足可访问性和响应式要求, 关键交互可自动验证]
      reviewer: tech-code-reviewer
      review_gates: [specification-compliance, code-quality]
      retry: {max_attempts: 2}
      failure_policy: block_dependents

    - id: mobile
      objective: 在授权文件范围内实现移动端场景、平台行为和真机验证
      agent: tech-mobile-dev
      depends_on: [architecture, test-strategy]
      requires: [product-requirements, technical-design, test-strategy]
      required_skills: [ui-ux-pro-max, test-driven-development, verification-before-completion]
      file_scope: required
      produces: {id: mobile-package, type: mobile-code}
      when: project-brief.channels contains mobile
      optional: true
      acceptance_criteria: [覆盖移动端核心场景, API调用符合契约, 平台权限与生命周期正确, 真机或等价环境证据可复现]
      reviewer: tech-code-reviewer
      review_gates: [specification-compliance, code-quality]
      retry: {max_attempts: 2}
      failure_policy: continue

    - id: integration-test
      objective: 对已通过代码审查的实现执行集成、端到端、验收和非功能测试
      agent: tech-qa
      depends_on: [backend, frontend]
      requires: [product-requirements, technical-design, test-strategy, backend-package, frontend-package]
      required_skills: [systematic-debugging, verification-before-completion]
      produces: {id: test-report, type: test-report}
      acceptance_criteria: [所有P0和P1用例通过, 无未披露阻断缺陷, 验收与非功能结果可复现]
      reviewer: core-quality-reviewer
      retry: {max_attempts: 2}
      failure_policy: block_dependents

    - id: release-readiness
      objective: 生成可重复构建与部署方案、健康检查、监控、回滚和发布就绪结论
      agent: tech-devops
      depends_on: [integration-test]
      requires: [technical-design, backend-package, frontend-package, test-report]
      required_skills: [verification-before-completion, finishing-a-development-branch]
      produces: {id: release-readiness-package, type: deployment-package}
      acceptance_criteria: [构建部署步骤可重复, 包含健康检查与可观测性, 回滚与故障恢复流程明确, 未经授权不执行生产变更]
      reviewer: core-quality-reviewer
      retry: {max_attempts: 2}
      failure_policy: fail_workflow
